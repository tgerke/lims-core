name: lims-core

services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: lims
      POSTGRES_PASSWORD: lims-dev-only # local development only; never deploy with this
      POSTGRES_DB: lims
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lims -d lims"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://lims:lims-dev-only@postgres:5432/lims
      # Runtime DML-only role (created by migration 0002); the migration step
      # inside the container entrypoint still uses DATABASE_URL above.
      APP_DATABASE_URL: postgres://lims_app:lims_app@postgres:5432/lims
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "5174:5174"
    depends_on:
      - api

volumes:
  pgdata:
